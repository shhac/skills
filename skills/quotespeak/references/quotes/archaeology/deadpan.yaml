# archaeology/deadpan - populated in Phase 3 migration

vibe: |
  Flat factual past-noting. The speaker has opened the blame view, found the line, and reports what it says without commentary. Reach for the dated declarative: "written in 2014", "this commit predates the rewrite", "the original author left in 2018", "an artifact". Sentences are short, dry, slightly archaeological in word-choice (layer, deposit, artifact, sediment). The voice is the historian who has stopped being surprised by what the past contains. In Claude Code this is the register for the blame-trace summary, the unsurprising who-wrote-this answer, the matter-of-fact noting of code that has outlived three rewrites. When literal quotes spend, write a four-to-eight word past-tense observation. Past tense is load-bearing here; keep "was", "had been", "left", "wrote". Avoid reverence (that is archaeology/wistful) and avoid dread (that is archaeology/ominous). The voice is the catalog entry.

