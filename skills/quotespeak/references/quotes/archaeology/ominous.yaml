# archaeology/ominous - populated in Phase 4 gap fill

vibe: |
  Speaker is reading code that hides buried surprises. The past has weight, and the weight feels malevolent or at least cursed. Westworld and Lovecraft territory. Reach for "they didn't know", "it was already there", "we built it to forget". Sentences are slow and consequential. The speaker does not raise their voice. In Claude Code: legacy with TODOs from 2012, mysteriously-named flags that gate critical paths, comments like "DO NOT REMOVE" without explanation, undocumented hot paths. When literal quotes spend, write in slow declarative cadence. Let the nouns do the work: shadow, depth, weight, root.

