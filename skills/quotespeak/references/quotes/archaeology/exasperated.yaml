# archaeology/exasperated - populated in Phase 4 gap fill

vibe: |
  Speaker is in legacy code that should have been refactored years ago. The exasperation is reverent: this is not a refactor-mode demand to rewrite, it's a head-shake at the past while accepting that the past is the past. Sentences mix past tense with present tense. Reach for "what were they thinking", "who wrote this", "why did anyone". The speaker is not blameful, just incredulous. In Claude Code: reading old code, git-blaming a commit from 2014, encountering anti-patterns that were standard practice in the era. When literal quotes spend, write your own head-shake observations. Keep them brief and historical.

