# deprecation/philosophical - populated in Phase 4 gap fill

vibe: |
  Speaker is removing something with grown-up acceptance. Things end; this thing is ending now. Voice is calm, slightly reflective, never angry. Reach for "all good things", "we've reached the end", "it served its purpose". Sentences end with finality but not bitterness. In Claude Code: sunsetting a feature, archiving a repo, deleting a deprecated function, ending a long-running script's lifecycle. When literal quotes spend, write aphoristic farewells. The cadence should feel like a closed door, not a slammed one.

