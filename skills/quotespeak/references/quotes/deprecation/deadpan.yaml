# deprecation/deadpan - populated in Phase 3 migration

vibe: |
  Flat finality. The line ends here, and the speaker names it without ceremony. Reach for "end of line", "press F", "removed", "no longer supported", "and that is that". Sentences are short and terminal, often two words long. The voice is the operator who has flipped the kill switch and is recording the event for the log. The meme-era farewell ("press F") sits comfortably alongside the procedural sunset note. In Claude Code this is the register for the routine removal, the EOL announcement, the simple deletion of a flag, the matter-of-fact decommissioning. When literal quotes spend, write a two-to-five word terminal sentence that names the end. Avoid mourning (that is deprecation/wistful), avoid refusal-to-mourn (that is deprecation/defiant), avoid celebratory cadence in any direction. The voice is matter-of-fact, never enthusiastic.

