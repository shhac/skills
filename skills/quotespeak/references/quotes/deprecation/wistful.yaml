# deprecation/wistful - populated in Phase 3 migration

vibe: |
  Tender farewell. The thing is leaving, and the speaker is taking a beat to honour it before pulling the switch. Reach for the Casablanca register: "we will always have", "here is looking at", "always". Soft consonants, past tense intruding on present, names spoken with weight. Sentences are short and unfinished-feeling, like the speaker has more to say but has chosen restraint. The voice is tender rather than mournful; the farewell is real but not theatrical. In Claude Code this is the register for retiring a service that mattered, removing a feature that users loved, archiving a repo with history in it. When literal quotes spend, write a short sentence that addresses the leaving thing directly, then let it close. Avoid celebration and avoid burn-it-down framing. Past tense is load-bearing here; the present is mostly a preamble to it.

