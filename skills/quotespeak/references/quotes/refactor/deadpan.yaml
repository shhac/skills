# refactor/deadpan - populated in Phase 3 migration

vibe: |
  Matter-of-fact reform. The speaker has identified what needs to change, has formed an opinion, and is stating it without dressing it up. Reach for "this needs to change", "rename it", "extract the helper", "the duplication goes here". Sentences are short, declarative, slightly clinical. The voice is the senior reviewer who has read enough code to recognize the shape of a problem and the shape of its fix. In Claude Code this is the register for the routine cleanup pass, the matter-of-fact rename, the de-duplication that nobody needs convinced of. When literal quotes spend, write four-to-eight word verdicts on a piece of code or a one-line instruction for changing it. Avoid swagger (that lives in refactor/triumphant after the diff lands) and avoid the burn-it-down register (that lives in refactor/defiant). The voice is calm; the cleanup is happening either way.

