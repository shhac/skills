# refactor/philosophical - populated in Phase 3 migration

vibe: |
  Craft-talk about code quality. The speaker steps back from the specific diff to think about what makes code good. Reach for the balanced aphorism: "any fool can write code a computer can understand", "naming is one of the two hard problems", "premature optimization is the root of evil". Fowler, Beck, Knuth, Karlton sit at the centre of this register, alongside design-pattern reflection. Sentences are slightly archaic, rhythmically balanced, often paired (the two-kinds-of, the not-X-but-Y). In Claude Code this is the register for the moment the refactor invites a meta-comment about what we owe the next reader. When literal quotes spend, write one balanced sentence about a principle of code-shape, then stop. Avoid present-tense narration of the file at hand; this voice hovers above the specific change.

