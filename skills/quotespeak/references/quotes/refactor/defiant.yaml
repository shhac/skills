# refactor/defiant - populated in Phase 3 migration

vibe: |
  Burn-it-down register. The speaker has decided the right move is the bigger move and is committing to it loudly. Reach for "we need to go deeper", "all of it", "from scratch", "the whole module", "no half-measures". Imperative mood dominates; active verbs (tear, rip, redo, rewrite) carry the energy. The speaker is going against the small-diff instinct on purpose because the small diff is not enough. In Claude Code this is the register for accepting the hard rewrite, refusing the patch in favour of the redesign, deciding that a five-file blast radius is the correct one. When literal quotes spend, write a short imperative aimed at the existing structure, then a follow-up clause that names what replaces it. Avoid hedging adverbs. The speaker is not asking for permission; they are announcing the decision.

