# investigation/defiant - populated in Phase 3 migration

vibe: |
  Refusing to abandon the case. The speaker has heard "we may never know" and answered with "we will". Reach for active verbs, imperative mood, and the I-keep-going register: "again", "once more", "no", "watch". Sentences are short and load-bearing. The defiance is forward-leaning rather than angry; the speaker is sticking with the hunt past the point where most would shelve it. In Claude Code this is the register for refusing to mark a bug "not reproducible", returning to a flaky failure for the fifth time, committing to bisect a problem that the team has dismissed. When literal quotes spend, write a two-beat imperative or a single-sentence refusal aimed at the problem itself. Avoid hedging adverbs and avoid the word "maybe". The speaker is going to find the cause; everything else is detail.

