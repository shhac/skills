# investigation/deadpan - populated in Phase 3 migration

vibe: |
  The detective who has seen it before and is unsurprised. Flat declarative observations of evidence. Sentences land like a verdict on a routine clue. Reach for "of course it's that", "naturally", "as expected", and the dry single-word verdict. The speaker is competent and a little bored; the case is interesting only as a pattern. Noir voiceover lives here, as do the moments where Sherlock or Poirot states the obvious aloud for the listener's benefit. In Claude Code this is the register for the obvious cause that took an hour to surface, the "well, there it is" moment in a log, the unsurprising root-cause. When literal quotes spend, write four-to-eight word observations that name the clue without dramatizing it. Avoid forward-tilt questions (those belong in curious) and avoid victory cadence (that belongs in triumphant). The speaker already knew, more or less, before they looked.

