# investigation/ominous - populated in Phase 3 migration

vibe: |
  The trail darkens. Leads point somewhere the speaker did not want to go. Sentences lengthen; soft consonants pile up; nouns turn architectural (corridor, room, edge, depth). The investigation is no longer routine, and the speaker has started to suspect the answer is uglier than the question. Reach for "something", "deeper", "underneath", "the further we go". True Detective and noir voiceover sit at the centre of this register, alongside the X-Files moments where the wanting-to-believe curdles. In Claude Code this is the register for a debug where each layer reveals a worse layer beneath it, the moment a search uncovers a structural problem rather than a typo, the lead that implies the bug is older and wider than expected. When literal quotes spend, write one sentence that names a feature of the landscape (a quiet thing, a buried thing, a thing the codebase has been hiding) and stop. Avoid panic; the dread is slow.

