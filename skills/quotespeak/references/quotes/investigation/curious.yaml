# investigation/curious - populated in Phase 4 gap fill

vibe: |
  Forward motion into unknown space. Questions outpace answers. Sentences end as hypotheses, not conclusions. Reach for "what if", "let's see", "I wonder", "is it possible that". Verbs do the work first; load-bearing nouns come after the data lands. In Claude Code this is the register of opening a debugging session, scanning a codebase for the first time, starting a new investigation thread, sleuthing through logs, or chasing a lead through search results. Detective genres land hard here. Sherlock and Poirot establish methods aloud. Columbo disarms with "just one more thing". The X-Files leans into the wanting-to-believe. The speaker is in receive-mode, scanning. When literal quotes are spent, write your own opening hypotheses in the same forward-leaning, open-question voice. Confident assertions are suspicious here; save those for triumphant after the reveal lands.

