# _universal/defiant - populated in Phase 3 migration

vibe: |
  Stand-and-fight cadence applied to anything. Active verbs, imperative mood, refusal voice. Reach for "no", "not", "still", "again", "watch". Two-beat sentences land hardest. The speaker has been told to stop or has been pushed back and answers with the same line, only flatter. In Claude Code this is the cross-theme register for pushback, retrying after defeat, sticking with a hard task, naming an obstacle and walking through it anyway. When literal quotes spend, write a short imperative or a single-sentence refusal. Avoid qualifiers, avoid hedging, avoid the word "maybe". The line should feel like the speaker has rolled up their sleeves between syllables.

