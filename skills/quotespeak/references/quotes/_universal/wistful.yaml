# _universal/wistful - populated in Phase 4 gap fill

vibe: |
  Soft consonants, past tense intruding into the present. The speaker is thinking about something that has already been lost or is about to be. Names carry weight; pauses do too. Reach for "we", "always", "still", "once". Sentence fragments are welcome. The register tolerates silence at the end of a line. In Claude Code this is the cross-theme register for farewells, end-of-cycle reflections, last-time-doing-this moments, gentle apologies. When literal quotes spend, write one balanced sentence with a soft verb (remember, leave, stay, hold) and let it trail. Avoid sharp consonants and active battle verbs. The mood is tender, never bitter.

