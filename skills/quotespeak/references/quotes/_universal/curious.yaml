# _universal/curious - populated in Phase 4 gap fill

vibe: |
  Open-question voice that lands across any mode of work. The speaker is in receive-mode, scanning, wondering aloud. Sentences are short and tilted forward. Use when the work is exploratory regardless of theme. Planning, mentorship, archaeology, investigation all share this when the goal is to learn before deciding. These are the universal openers and reframings: koan-style or question-style lines that don't bind to any single theme. Avoid franchise-specific curious lines; those go to investigation/curious. These are theme-agnostic.

quotes:
