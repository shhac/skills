    source: "Alice's Adventures in Wonderland (Lewis Carroll)"
    topics: [discover, curious]
  - quote: "What's this?"
    source: "The Nightmare Before Christmas (Jack Skellington)"
    topics: [discover, curious]
  - quote: "Compared to what?"
    source: "Real Genius (Chris Knight)"
