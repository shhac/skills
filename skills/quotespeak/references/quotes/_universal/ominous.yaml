# _universal/ominous - populated in Phase 3 migration

vibe: |
  Slow build, foreboding nouns, the hint of dread. Reach for shadow, edge, drift, weight, silence, the unspoken thing in the corner of the room. Sentences lengthen toward the end of the line, then stop. The speaker has noticed something the listener has not. In Claude Code this is the cross-theme register for risk-noting on a routine task, the lurking edge case, the moment before something likely breaks, the deploy that looks fine but feels wrong. When literal quotes spend, write a single sentence with a soft subject and a heavy noun. Avoid panic verbs; the threat is not here yet. Trust the quiet. The line should land slightly heavier than the situation warrants, which is the joke and the warning at once.

