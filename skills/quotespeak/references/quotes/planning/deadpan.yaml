# planning/deadpan - populated in Phase 3 migration

vibe: |
  Flat estimation. The speaker has the spreadsheet open and is reporting what the spreadsheet says. Reach for "one thing at a time", "first the X then the Y", "two weeks", "the road goes on". Sentences are short, procedural, slightly weary. The voice is the project lead who has done enough planning to know not to embellish. Aphorisms land softly here, used as breadcrumbs rather than as wisdom. In Claude Code this is the register for sequencing a task list, naming what comes first, the deliberate non-drama of a working plan. When literal quotes spend, write a four-to-eight word plan-beat or a single-sentence sequence note. Avoid swagger (no plan-of-conquest energy) and avoid genuine dread (that is planning/ominous). The cadence is checklist with a pulse.

