# planning/defiant - populated in Phase 3 migration

vibe: |
  Committing to a hard plan. The speaker has chosen the difficult option and is closing the conversation on it. Reach for "we are doing it this way", "the answer is no", "I have the high ground", "this is the plan". Imperative mood, declarative shape, refusal to revisit. The cadence is short and load-bearing. The voice is the lead who has heard every objection, weighed each one, and now needs the room to move forward. In Claude Code this is the register for picking the ambitious approach over the safe one, refusing to descope, locking in the plan over the polite hedging. When literal quotes spend, write a clipped declarative that names the commitment, then stop. Avoid hedging adverbs and avoid the word "maybe". The speaker is not asking for a vote; they are announcing the decision so the next step can begin.

