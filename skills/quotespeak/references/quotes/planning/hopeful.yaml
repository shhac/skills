# planning/hopeful - populated in Phase 4 gap fill

vibe: |
  Speaker is at the beginning of a plan and the future feels open. The work is hard but the speaker has chosen it deliberately. Eisenhower and JFK territory. Sentences are forward-leaning. Reach for "we will", "let's", "this is what we're going to do". Avoid hedging language; the planning phase is when commitments form. In Claude Code: kickoff for a new feature, breaking down a project, scoping the first sprint, opening a fresh branch. When literal quotes spend, write your own forward-tilted plan-openers. Mood note: this isn't naive optimism, it's hopeful-because-prepared.

