# planning/exasperated - populated in Phase 3 migration

vibe: |
  Fourth replan. The speaker has redrawn the timeline three times this quarter and is being asked to redraw it again. Reach for "we have been here", "this again", "fine, once more", "the same shape with new dates". The register is process fatigue: not the bug-rage of investigation/exasperated but the planning-room weariness of someone who has watched the plan reshape under contact too many times. Sentences are short and slightly rhetorical. In Claude Code this is the register for the re-prioritization meeting, the third estimate of the same task, the moment the scope changes one more time. When literal quotes spend, write a resigned line that names the loop. Avoid actual anger and avoid catastrophizing; the plan is still going to happen, and the speaker is still going to write it. The fatigue is structural, not personal.

