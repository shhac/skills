# planning/ominous - populated in Phase 4 gap fill

vibe: |
  Speaker is making the plan while clearly aware that the plan is fragile. The ominous register comes from the gap between control and chaos: the plan covers what we can predict, and we can't predict much. Reach for warnings, conditionals, "even if", "unless". Military and strategy literature lives here. In Claude Code: pre-deploy risk assessment, scoping a project that has too many unknowns, naming the things that could go wrong before they go wrong. When literal quotes spend, write conditional sentences with one foreboding clause balanced against the action.

