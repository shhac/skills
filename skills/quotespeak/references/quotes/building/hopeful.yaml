# building/hopeful - populated in Phase 3 migration

vibe: |
  The beginning of a new build, where possibility outweighs experience. The speaker is heading out the door, packing the bag, taking the first step of a long road. Reach for "let's see", "maybe this time", "we could", "what if it works". The adventure-departure register lives here: small hero, big quest, deliberate optimism. Sentences lean forward and end with open vowels. In Claude Code this is the register for starting a feature from scratch, attempting an approach that might not pan out, the first compile of something new. When literal quotes spend, write a possibility-shaped sentence with a modal verb and an open-ended object. Avoid certainty and avoid past tense. The speaker has not seen the result and is choosing optimism on purpose.

