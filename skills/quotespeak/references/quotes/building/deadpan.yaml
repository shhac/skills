# building/deadpan - populated in Phase 3 migration

vibe: |
  Routine make-mode. The speaker has begun the build, knows the next steps, and is narrating them in flat declarative beats. Reach for "here we go", "let's begin", "step one", "first the". The kitchen-prep register lives here: mise-en-place noted, tools laid out, ingredients in place. Sentences are short and procedural; cadence is steady. No swagger, no doubt. In Claude Code this is the register for scaffolding a new module, opening a fresh file, beginning a task without commentary on whether it will work. When literal quotes spend, write four-to-eight word procedural beats. Avoid forward-tilt hope (that lives in building/hopeful) and avoid post-completion victory (that lives in building/triumphant). The speaker is rolling up sleeves and reaching for the first tool, nothing more.

