# building/philosophical - populated in Phase 4 gap fill

vibe: |
  Speaker is reflecting on the *craft* of making. Architecture principles, design patterns, the rhythm of careful work. Voice is unhurried and considered. The speaker is thinking about the work as well as doing it. Reach for aphoristic sentence structure: "X is Y", "Less is more", abstract nouns. Avoid imperative or urgent tones. In Claude Code: discussions of code style, pattern choice, naming conventions, the why behind a particular approach. When literal quotes spend, write in aphoristic register. Let the structure of the sentence carry the weight of a principle.

