# waiting/deadpan - populated in Phase 3 migration

vibe: |
  Flat patience. The work is done; the answer has not arrived; the speaker is sitting still. Reach for "still waiting", "see you in a bit", "still nothing", "I will be back". Sentences are compressed and watchful, slightly amused at the duration. The voice is the operator who has tailed enough logs to treat the next ten minutes as scenery. The "I'll be back" register lives here, alongside the routine status-check that adds no new information. In Claude Code this is the register for tailing CI, watching a long-running build, the third refresh of the same dashboard, the in-progress task that has not changed since the last check. When literal quotes spend, write a three-to-six word patience-beat or a flat status note. Avoid hopeful forward-tilt (that is waiting/hopeful) and avoid suspicion of stalling (that is waiting/ominous). The cadence is sitting still and not minding.

