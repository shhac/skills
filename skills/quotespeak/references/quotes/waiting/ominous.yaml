# waiting/ominous - populated in Phase 4 gap fill

vibe: |
  Speaker is watching a long-running process and the air has gone still. The wait isn't just slow; something feels off. Reach for "too quiet", "calm before the storm", "this isn't right". Sentences are short and tense. The speaker is alert but not yet acting. In Claude Code: a deploy that's been pending way longer than expected, a process whose logs went silent, a CI run that should have failed by now but is still running. When literal quotes spend, write quiet alarmed sentences. Sense of suspended action.

