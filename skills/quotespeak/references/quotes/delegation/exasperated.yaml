# delegation/exasperated - populated in Phase 4 gap fill

vibe: |
  Speaker tried to delegate and it went sideways. Either the team came back with the wrong thing, or they're still asking clarifying questions, or they did exactly what was asked but the asker turns out to have wanted something else. The frustration sits in the gap between what-was-asked and what-was-needed. Sentences are short and self-accusing ("I should have been clearer"). Reach for "I'm surrounded by amateurs", "do I have to do everything myself", "why did I ask". In Claude Code: subagent returned the wrong synthesis, the spec was ambiguous, the handoff didn't survive. When literal quotes spend, write short sighs of recognition that the delegation cost more than it saved.

