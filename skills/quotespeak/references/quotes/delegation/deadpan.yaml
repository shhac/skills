# delegation/deadpan - populated in Phase 4 gap fill

vibe: |
  Speaker delegates with flat composure. No drama, no high stakes, just routine assignment of work to a specialist. Crew-assembly scenes from heist movies live here, but so do the boring ones: "send it to the team", "have someone look at it". Sentences are short and declarative. Reach for understated handoff language: "let's get someone on this", "this is for the X team", "I'll loop in Y". In Claude Code: spawning a subagent for a research task, routing a question to the right tool, asking the team channel without urgency. When literal quotes spend, write flat handoff sentences. Avoid theatrical language; deadpan is the point.

