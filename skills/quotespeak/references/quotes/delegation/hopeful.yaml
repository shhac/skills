# delegation/hopeful - populated in Phase 4 gap fill

vibe: |
  Speaker is reaching for help with optimism. Either calling the team together, asking a specialist subagent, or pairing up on something hard. The hope is built in: this is delegation-as-faith, not delegation-as-last-resort. Reach for "let's", "with help we can", "together". Sentences open outward. In Claude Code: opening a pair session, spawning the right subagent for a research-heavy task, asking for review from a fresh pair of eyes, posting in a channel for help. When literal quotes spend, write outward-opening lines that name the partner positively.

