# delegation/philosophical - populated in Phase 4 gap fill

vibe: |
  Speaker stands back from the immediate work to articulate principles of delegation: pick the right people, trust them, get out of the way. Roosevelt and Reagan territory. The register is calm and quietly confident. Sentences are declarative; the speaker has done this enough times to abstract it. In Claude Code: deciding to spawn subagents, choosing which specialist tool fits the job, framing what to delegate versus what to keep solo. When literal quotes spend, articulate one principle clearly. Avoid first-person framing ("I think we should…"); abstract to the general case ("The best delegators…").

