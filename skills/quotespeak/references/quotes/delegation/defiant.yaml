# delegation/defiant - populated in Phase 4 gap fill

vibe: |
  Speaker is refusing to do it alone. The defiance is in the *teamup*: I will not be the lone hero; we will face this together. Reach for "we", "all of us", "stronger together". Sentences are short and rallying. Battle-cry adjacent but not strictly martial; rallies for civic causes live here too. In Claude Code: refusing to take on a project solo, insisting on a teammate or subagent, marshaling a code-review crowd. When literal quotes spend, write short collective declarations.

