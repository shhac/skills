# incident/defiant - populated in Phase 4 gap fill

vibe: |
  Speaker is the fixer-arrives. Production is broken; the speaker is unhurried and competent. The defiance is quiet: a refusal to panic, not a battle-cry. Mr. Wolf and Captain America territory. Reach for understatement: "I solve problems", "let's get this sorted", "we'll be fine". Active verbs, calm cadence. In Claude Code: arriving at an incident channel, taking ownership of a hotfix, leading a rollback. When literal quotes spend, write short defiant lines that sound like the speaker has done this before.

