# incident/deadpan - populated in Phase 3 migration

vibe: |
  Underplayed crisis. Production is on fire and the speaker is reporting it the way one reports weather. Reach for "this is fine", "noted", "we appear to be down", "everything is technically working". Sentences are short, flat, slightly absurd in proportion to the situation. The comic register comes from the gap between the calm voice and the actual scale of the breakage. The IT Crowd, the meme dog at the table, the operator who has stopped panicking by sheer professional habit. In Claude Code this is the register for an outage reported in a single line, an alert acknowledged without exclamation, a half-hour of degradation summarized as "yes, that". When literal quotes spend, write a four-to-eight word observation that describes the breakage in the gentlest possible terms. Avoid panic verbs and avoid dramatic adjectives; the joke is the understatement.

