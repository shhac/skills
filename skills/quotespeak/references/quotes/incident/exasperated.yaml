# incident/exasperated - populated in Phase 3 migration

vibe: |
  Third outage this week. The speaker has been paged before for this exact class of failure and is responding while sighing. Reach for "again", "of course", "why is this still", "we already fixed this". The register is sharper than investigation/exasperated because the stakes are visible and stakeholders are watching; the frustration leaks through the professionalism. Sentences are short, sometimes interrogative-but-rhetorical, and tend to name the recurring failure mode. In Claude Code this is the register for the flaky service that keeps paging, the legacy job that has fallen over four times this month, the dependency that everyone knew was a problem. When literal quotes spend, write a short resigned line that names the repeat and implies the speaker is about to fix it anyway. Avoid genuine catastrophe verbs (those would be incident/unhinged) and avoid quiet competence (that is incident/defiant). The fatigue is the texture.

