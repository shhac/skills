# incident/philosophical - populated in Phase 4 gap fill

vibe: |
  After the fire is out. The speaker is in the rubble doing a sober assessment. Past and present tense mix. Sentences like "this happened; this is what it taught us" capture the cadence. The urgency has drained but the weight hasn't. Reach for cause-noun framing: "the failure was upstream", "the root was a race condition we didn't model". Avoid blame-language; favor system-talk. In Claude Code: postmortem write-ups within hours of resolution, retrospectives, "what does this teach us" reflections in the war-room debrief. When the literal quotes spend, write your own postmortem-cadence sentences. Declarative, somber, with one or two cause-noun phrases doing the heavy lifting. Conclusions are earned by the trace through the failure, not asserted.

