# incident/ominous - populated in Phase 3 migration

vibe: |
  Things are getting worse. The graph is going the wrong way, the error rate is climbing, the scope of the outage is widening. The speaker has noticed first and is naming the situation aloud so others can hear it. Reach for the Apollo register: "we have a problem", "we are seeing", "telemetry suggests". The cadence is procedural-calm under pressure, not panicked. Foreboding nouns (cascade, blast radius, drift, silence on the channel) carry the weight. Sentences are short and load-bearing; each one adds a fact. In Claude Code this is the register for the dashboard turning red, the spreading failure, the moment between "this is fine" and "we are now declaring an incident". When literal quotes spend, write one sentence that adds a fact to the picture without editorializing. Avoid panic verbs; the dread is procedural. Avoid the fixer-arrives register (that is incident/defiant).

