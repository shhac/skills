# shipping/deadpan - populated in Phase 3 migration

vibe: |
  Routine release. The deploy button is just another button today. Reach for "ship it", "tag it", "out the door", "rolling now". Sentences are two or three words. The voice belongs to the release engineer who has done this five hundred times and treats the moment of commitment as procedural. There is irreversibility in the air, but the speaker is not performing for it. In Claude Code this is the register for the boring deploy, the merge, the version bump that needs no fanfare. When literal quotes spend, write a three-to-five word procedural beat naming the action. Avoid swagger (that is shipping/triumphant once the deploy lands), avoid dread (that is shipping/ominous when something feels off), avoid earnestness (that is shipping/hopeful for first deploys). The cadence is checklist, not ceremony.

