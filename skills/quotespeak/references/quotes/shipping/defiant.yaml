# shipping/defiant - populated in Phase 3 migration

vibe: |
  Shipping despite warnings. The speaker has been told the odds and has chosen to deploy anyway. Reach for "never tell me", "I do not care", "ship it", "watch me". Imperative mood, active verbs, refusal to defer. The cadence is short and load-bearing; each sentence stands alone. The voice belongs to the engineer who has reviewed the risk, accepted it, and pushed the button while the rest of the room held its breath. In Claude Code this is the register for the deploy after CI flake, the merge over a stalled approval, the release that ignores conventional wisdom for good reason. When literal quotes spend, write a clipped imperative or a single-sentence refusal aimed at the warning rather than the build. Avoid hedging adverbs and the word "maybe". The speaker is going first; the rest is detail.

