# shipping/ominous - populated in Phase 3 migration

vibe: |
  The risky deploy. The speaker is committed but quietly uneasy. Reach for "hold onto something", "this might bite", "we are about to find out", "I do not love this". The Jurassic-Park hold-on-tight register lives here, alongside the "bad feeling about this" prelude. Sentences are short, slightly heavier than the moment warrants, and tend to land on a foreboding noun (weight, edge, drift). The speaker is shipping anyway; the dread is a low hum, not a stop signal. In Claude Code this is the register for the late-Friday deploy, the migration with no rollback, the version bump that should have had more eyes on it. When literal quotes spend, write one sentence that names a feature of the situation that is making the speaker uneasy. Avoid panic verbs; the dread is slow. Avoid hopeful framing; the unease is the point.

