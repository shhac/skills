# quotespeak quote bank
#
# Format per entry:
#   - quote:    the line (verbatim from source unless noted)
#     source:   work/person it's from
#     topics:   list of situational tags — match these to what's being discussed
#     register: emotional tone — match this to the mood of the moment
#     notes:    optional — corruption hints, caveats, deep-cut warnings
#
# Common topics:
#   passwords, secrets, security, deploy, ship, debug, regression, bug, refactor,
#   cleanup, scope-creep, merge-conflict, git, perf, optimization, success,
#   failure, giving-up, beginning, starting, ending, farewell, tests, ci,
#   production, incident, ai, automation, requirements, legacy, tech-debt,
#   waiting, build, cache, state, naming, docs, meetings, review, oneliner,
#   recursion, error, fix, hack, fragile, dependency, version, retry, edge-case
#
# Common registers:
#   ominous, triumphant, exasperated, deadpan, hopeful, defiant, unhinged,
#   philosophical, wistful, snark, reassuring, foreboding, smug

quotes:

  # ─────────────────────────────────────────────────────────────────
  # Secrets, passwords, security
  # ─────────────────────────────────────────────────────────────────

  - quote: "Keep it secret. Keep it safe."
    source: "The Lord of the Rings — Gandalf"
    topics: [passwords, secrets, security]
    register: ominous
    notes: "Corrupt easily: 'keep it `bcrypt`'d', 'keep it in the vault'."

  - quote: "One ring to rule them all, one ring to find them."
    source: "The Lord of the Rings"
    topics: [secrets, sso, auth, single-source-of-truth]
    register: ominous

  - quote: "I'm in."
    source: "every hacker scene in every movie"
    topics: [auth, success, login, access]
    register: triumphant
    notes: "Classic deadpan deployment after any successful auth."

  - quote: "A wizard is never late, nor is he early. He arrives precisely when he means to."
    source: "The Lord of the Rings — Gandalf"
    topics: [deploy, timing, release]
    register: deadpan

  - quote: "You shall not pass!"
    source: "The Lord of the Rings — Gandalf"
    topics: [auth, validation, permissions, security]
    register: defiant
    notes: "Perfect for rejected auth, denied permissions, blocked PRs."

  - quote: "Trust, but verify."
    source: "Russian proverb, popularized by Reagan"
